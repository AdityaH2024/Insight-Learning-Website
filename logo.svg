<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background rounded square -->
  <rect width="120" height="120" rx="22" fill="#1a6b8a"/>

  <!-- Book pages (white) -->
  <rect x="22" y="38" width="76" height="52" rx="6" fill="white" opacity="0.15"/>
  <rect x="26" y="42" width="68" height="44" rx="4" fill="white" opacity="0.12"/>

  <!-- Open book shape -->
  <path d="M60 44 C60 44 36 42 28 50 L28 82 C36 74 60 76 60 76 C60 76 84 74 92 82 L92 50 C84 42 60 44 60 44Z"
        fill="white" opacity="0.9"/>

  <!-- Book spine center line -->
  <rect x="58" y="44" width="4" height="32" rx="2" fill="#1a6b8a" opacity="0.4"/>

  <!-- Left page lines -->
  <rect x="33" y="56" width="22" height="2.5" rx="1.25" fill="#1a6b8a" opacity="0.25"/>
  <rect x="33" y="62" width="18" height="2.5" rx="1.25" fill="#1a6b8a" opacity="0.25"/>
  <rect x="33" y="68" width="20" height="2.5" rx="1.25" fill="#1a6b8a" opacity="0.25"/>

  <!-- Right page lines -->
  <rect x="65" y="56" width="22" height="2.5" rx="1.25" fill="#1a6b8a" opacity="0.25"/>
  <rect x="65" y="62" width="18" height="2.5" rx="1.25" fill="#1a6b8a" opacity="0.25"/>
  <rect x="65" y="68" width="20" height="2.5" rx="1.25" fill="#1a6b8a" opacity="0.25"/>

  <!-- Graduation cap on top -->
  <polygon points="60,18 82,30 60,42 38,30" fill="#f59e0b"/>
  <rect x="76" y="30" width="3" height="14" rx="1.5" fill="#f59e0b"/>
  <circle cx="77.5" cy="46" r="3.5" fill="#f59e0b"/>

  <!-- "IL" letters subtle hint -->
  <!-- Removed to keep it clean with the book + cap -->
</svg>
